name: ✨ Feature Request
description: Propose a well-scoped enhancement or new capability.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please check the roadmap and existing issues before opening a new request.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who needs it and why?
      placeholder: "When building X, I need to ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you would like, including the API or DX you imagine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider, and why were they not ideal?
    validations:
      required: false
  - type: dropdown
    id: breaking
    attributes:
      label: Does this introduce a breaking change?
      options:
        - "No"
        - "Yes"
        - "Not sure"
    validations:
      required: true
  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request for this feature.
          required: false
