name: 🐛 Bug Report
description: Report a reproducible defect so it can be confirmed and fixed.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please search existing issues first to avoid duplicates.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
      placeholder: "Typed route params are not inferred when ..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version (or commit) are you running?
      placeholder: "0.3.1"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: A minimal reproduction. Include a repository link or code snippet.
      placeholder: |
        1. Create a route with ...
        2. Call it with ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include logs or stack traces.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, and any other relevant details.
      placeholder: |
        - OS: Ubuntu 22.04
        - Node.js: 20.x
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on the latest version.
          required: true
